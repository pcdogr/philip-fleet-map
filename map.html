#map { height: 100vh; width: 100%; }
.legend {

.dot-sg { background: #2ed573; box-shadow: 0 0 8px rgba(46,213,115,0.4); }
.dot-other { background: #5f6c80; }
.legend-item .count { margin-left: auto; color: rgba(255,255,255,0.5); font-size: 12px; }
.stats-bar {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(10, 14, 23, 0.88);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 24px;

  display: flex;
  gap: 24px;
  font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.stats-bar .stat { display: flex; align-items: center; gap: 6px; }
.stats-bar .num { font-weight: 700; font-size: 15px; }
.num-cn { color: #ff4757; }
.num-sg { color: #2ed573; }
.custom-popup .leaflet-popup-content-wrapper {
  background: rgba(10, 14, 23, 0.95);
  backdrop-filter: blur(8px);
  color: #e0e0e0;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.custom-popup .leaflet-popup-tip { background: rgba(10, 14, 23, 0.95); }
.popup-content { padding: 4px; min-width: 260px; }
.popup-content h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #fff; }
.popup-content .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
.popup-content .row:last-child { border-bottom: none; }
.popup-content .label { color: rgba(255,255,255,0.5); }
.popup-content .value { color: #e0e0e0; font-weight: 500; text-align: right; }
.popup-content .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-cn { background: rgba(255,71,87,0.25); color: #ff4757; }
.badge-sg { background: rgba(46,213,115,0.25); color: #2ed573; }
.badge-other { background: rgba(95,108,128,0.25); color: #8c9cad; }
.ship-marker { 
  width: 36px; height: 36px; 
  border-radius: 50%; 
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-weight: 700;
  border: 2px solid;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.ship-marker:hover { transform: scale(1.25); }
.marker-cn { background: rgba(255,71,87,0.25); border-color: #ff4757; color: #ff4757; }
.marker-sg { background: rgba(46,213,115,0.25); border-color: #2ed573; color: #2ed573; }
.marker-other { background: rgba(95,108,128,0.25); border-color: #5f6c80; color: #8c9cad; }
.leaflet-marker-icon { background: none !important; border: none !important; }

  const g = {};
  for (const x of s) {
    if (!x.lat || !x.lng) continue;
    const k = `${x.lat.toFixed(2)}_${x.lng.toFixed(2)}`;
    if (!g[k]) g[k] = [];
    g[k].push(x);
  }
  return g;
}

    popupAnchor: [0, -22]
  });
  
  const m = L.marker([lat, lng], { icon }).addTo(map).bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 340 });
  markers.push(m);
  markerLayers[direction].push(m);
}

document.getElementById('count-cn').textContent = markerLayers.china.length;
document.getElementById('count-sg').textContent = markerLayers.singapore.length;
document.getElementById('count-other').textContent = markerLayers.other.length;
document.getElementById('total-count').textContent = SHIPS.filter(s => s.lat).length;
document.getElementById('stat-cn').textContent = SHIPS.filter(s => s.direction === 'china').length;
document.getElementById('stat-sg').textContent = SHIPS.filter(s => s.direction === 'singapore').length;
document.getElementById('stat-other').textContent = SHIPS.filter(s => s.direction === 'other' && s.lat).length;

function filterDirection(dir) {
  for (const m of markers) map.removeLayer(m);
  if (dir === 'all') { for (const m of markers) map.addLayer(m); return; }
  for (const m of markerLayers[dir]) map.addLayer(m);
}

let currentFilter = 'all';
document.getElementById('filter-cn').onclick = () => {
  if (currentFilter === 'china') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'china'; filterDirection('china'); }
};
document.getElementById('filter-sg').onclick = () => {
  if (currentFilter === 'singapore') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'singapore'; filterDirection('singapore'); }
};
document.getElementById('filter-other').onclick = () => {
  if (currentFilter === 'other') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'other'; filterDirection('other'); }
};
document.getElementById('filter-all').onclick = () => { currentFilter = 'all'; filterDirection('all'); };

filterDirection('all');
const cnShips = SHIPS.filter(s => s.direction === 'china' && s.lat);
if (cnShips.length > 0) {
  map.fitBounds(L.latLngBounds(cnShips.map(s => [s.lat, s.lng])).pad(0.2));
}
</script>
</body>
</html>
