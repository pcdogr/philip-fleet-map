<title>🚢 Philip Fleet Tracker</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;overflow:hidden;height:100vh;-webkit-text-size-adjust:100%}
#map{height:100vh;width:100%}
#loginOverlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#0a0e17;display:flex;align-items:center;justify-content:center}
#loginBox{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px 32px;width:90%;max-width:360px;text-align:center}
#loginBox h1{font-size:26px;color:#fff;margin-bottom:6px}
#loginBox p{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:28px}
#loginBox input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:16px;outline:none;margin-bottom:14px;box-sizing:border-box}
#loginBox input:focus{border-color:#4a7dff}
#loginBox button{width:100%;padding:14px;background:#4a7dff;border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
#pwErr{color:#ff4757;font-size:13px;margin-top:10px;display:none}
.hidden{display:none!important}
.panel{position:fixed;z-index:1000;background:rgba(10,14,23,0.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 14px}
.panel h3{font-size:12px;font-weight:600;margin-bottom:8px;color:rgba(255,255,255,0.6);letter-spacing:1px;text-transform:uppercase}
#ownerPanel{top:16px;left:16px;width:180px;max-height:calc(100vh - 120px);overflow-y:auto}
#ownerPanel::-webkit-scrollbar{width:3px}
#ownerPanel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.oi{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;cursor:pointer;font-size:11px;transition:background .15s;margin-bottom:1px}
.oi:hover{background:rgba(255,255,255,0.06)}
.oi .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.oi .oname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.oi .ocnt{color:rgba(255,255,255,0.35);font-size:10px}
.oi.active{background:rgba(255,255,255,0.1)}
#dirPanel{top:16px;right:16px;min-width:120px}
.di{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .15s}
.di:hover{background:rgba(255,255,255,0.06)}
.di .dcnt{margin-left:auto;color:rgba(255,255,255,0.35);font-size:11px}
.di.active{background:rgba(255,255,255,0.1)}
#statsBar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(10,14,23,0.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 20px;display:flex;gap:18px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#statsBar .num{font-weight:700;font-size:14px}
.num-cn{color:#ff4757}
.num-sg{color:#2ed573}
.custom-popup .leaflet-popup-content-wrapper{background:rgba(10,14,23,0.95)!important;backdrop-filter:blur(8px);color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.custom-popup .leaflet-popup-tip{background:rgba(10,14,23,0.95)!important}
.popup-content{padding:4px;min-width:260px}
.popup-content h2{font-size:14px;font-weight:700;margin-bottom:4px;color:#fff}
.popup-content .row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
.popup-content .row:last-child{border-bottom:none}
.popup-content .label{color:rgba(255,255,255,0.45)}
.popup-content .value{color:#e0e0e0;font-weight:500;text-align:right}
.ship-marker{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid;cursor:pointer;transition:transform .15s}
.ship-marker:hover{transform:scale(1.25);z-index:1000!important}
.marker-cn{background:rgba(255,71,87,0.2);border-color:#ff4757;color:#fff;box-shadow:0 0 12px rgba(255,71,87,0.4)}
.marker-sg{background:rgba(46,213,115,0.2);border-color:#2ed573;color:#fff;box-shadow:0 0 12px rgba(46,213,115,0.4)}
.marker-other{background:rgba(10,14,23,0.85);border-color:rgba(255,255,255,0.3);color:#fff}
</style>

    initMap();
    try{localStorage.setItem("fleet_auth","1");}catch(e){}
  }else{
    document.getElementById("pwErr").style.display="block";
    document.getElementById("pw").value="";
  }
}
try{if(localStorage.getItem("fleet_auth")==="1"){
  document.getElementById("loginOverlay").classList.add("hidden");
  setTimeout(initMap,300);
}}catch(e){}

function initMap(){
  if(typeof L==='undefined'){setTimeout(initMap,500);return;}
  var map=L.map('map',{center:[15,120],zoom:3,minZoom:2,maxBounds:[[-80,-180],[80,180]]});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OSM',maxZoom:19}).addTo(map);
  
  var cnKw=['CN','CHINA','QINGDAO','DALIAN','ZHOUSHAN','CHIWAN','HUANGPU','DDG','ZHUHAI','HUIZHOU','SHANGHAI','MACHONG','XINSHA','SHANWEI','QIDONG','RUGAO','CHANGXINDAO','ZOS','LEIZHOU','FANGCHENG','BAYUQUAN','YANGPU','HONGKONG','HONG KONG','QINZHOU','ZHEJIANG','DANDONG'];
  var sgKw=['SINGAPORE','SGSING'];
  function dirOf(d){if(!d)return'other';var u=d.toUpperCase().replace(/\s/g,'');for(var k=0;k<cnKw.length;k++){if(u.indexOf(cnKw[k])>=0)return'china'}for(var k=0;k<sgKw.length;k++){if(u.indexOf(sgKw[k])>=0)return'singapore'}return'other'}
  
  var allMarkers=[];
  var activeOwner=null,activeDir='all';
  
  // Compute directions for each ship and pre-count
  for(var i=0;i<SHIPS.length;i++){
    SHIPS[i].dr=dirOf(SHIPS[i].d);
  }
  
  // Build markers
  for(var i=0;i<SHIPS.length;i++){
    var s=SHIPS[i];
    if(!s.la||!s.lo)continue;
    var cls=s.dr==='china'?'marker-cn':s.dr==='singapore'?'marker-sg':'marker-other';
    var lbl=s.dr==='china'?'🇨🇳':s.dr==='singapore'?'🇸🇬':'🌍';
    var clr=OWNER_COLORS[s.o]||'rgba(255,255,255,0.3)';
    var ico=L.divIcon({className:'',html:'<div class="ship-marker '+cls+'" style="border-color:'+clr+'">'+lbl+'</div>',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-19]});
    var pop='<div class="popup-content"><h2>🚢 '+s.n+'</h2>'+
      '<div class="row"><span class="label">IMO</span><span class="value">'+s.i+'</span></div>'+
      '<div class="row"><span class="label">船东</span><span class="value">'+(s.o||'')+'</span></div>'+
      '<div class="row"><span class="label">类型</span><span class="value">'+(s.t||'')+'</span></div>'+
      '<div class="row"><span class="label">总吨</span><span class="value">'+(s.g||'')+'</span></div>'+
      '<div class="row"><span class="label">船旗/年份</span><span class="value">'+(s.f||'')+' · '+(s.y||'')+'</span></div>'+
      '<div class="row"><span class="label">目的港</span><span class="value">'+(s.d||'').substring(0,30)+'</span></div>'+
      '<div class="row"><span class="label">ETA</span><span class="value">'+(s.e||'')+'</span></div></div>';
    var m=L.marker([s.la,s.lo],{icon:ico}).bindPopup(pop,{className:'custom-popup',maxWidth:320});
    m._ship=s;allMarkers.push(m);m.addTo(map);
  }
  
  // Filter function
  function applyFilter(){
    var filtered=allMarkers.filter(function(m){
      var s=m._ship;
      if(activeOwner&&s.o!==activeOwner)return false;
      if(activeDir!=='all'&&s.dr!==activeDir)return false;
      return true;
    });
    // Remove all, re-add filtered
    for(var j=0;j<allMarkers.length;j++){try{map.removeLayer(allMarkers[j]);}catch(e){}}
    for(var j=0;j<filtered.length;j++){filtered[j].addTo(map);}
    
    var cn=filtered.filter(function(m){return m._ship.dr==='china'}).length;
    var sg=filtered.filter(function(m){return m._ship.dr==='singapore'}).length;
    document.getElementById('statAll').textContent=filtered.length;
    document.getElementById('statCN').textContent=cn;
    document.getElementById('statSG').textContent=sg;
  }
  
  // Owner panel
  function renderOwners(){
    var list=document.getElementById('ownerList');list.innerHTML='';
    for(var oi=0;oi<OWNER_ORDER.length;oi++){
      var o=OWNER_ORDER[oi];
      var cnt=SHIPS.filter(function(s){return s.o===o&&s.la}).length;
      var total=SHIPS.filter(function(s){return s.o===o}).length;
      var div=document.createElement('div');div.className='oi'+(activeOwner===o?' active':'');
      div.innerHTML='<span class="dot" style="background:'+OWNER_COLORS[o]+'"></span><span class="oname">'+o+'</span><span class="ocnt">'+cnt+'/'+total+'</span>';
      div.onclick=function(owner){return function(){
        activeOwner=activeOwner===owner?null:owner;
        renderOwners();
        applyFilter();
      };}(o);
      list.appendChild(div);
    }
  }
  
  // Direction panel
  var dirs=[
    {id:'all',label:'🌐 全部'},
    {id:'china',label:'🇨🇳 中国'},
    {id:'singapore',label:'🇸🇬 新加坡'},
    {id:'other',label:'🌍 其他'}
  ];
  function renderDirs(){
    var list=document.getElementById('dirList');list.innerHTML='';
    for(var di=0;di<dirs.length;di++){
      var d=dirs[di];
      var cnt=allMarkers.filter(function(m){return d.id==='all'||m._ship.dr===d.id}).length;
      var div=document.createElement('div');div.className='di'+(activeDir===d.id?' active':'');
      div.innerHTML='<span>'+d.label+'</span><span class="dcnt">'+cnt+'</span>';
      div.onclick=function(dir){return function(){
        activeDir=dir;
        renderDirs();
        applyFilter();
      };}(d.id);
      list.appendChild(div);
    }
  }
  
  renderOwners();
  renderDirs();
  applyFilter();
  
  // Show panels
  document.getElementById('ownerPanel').style.display='';
  document.getElementById('dirPanel').style.display='';
  document.getElementById('statsBar').style.display='';
  
  setTimeout(function(){map.invalidateSize();},300);
}

if(typeof L==='undefined'){
  var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload=function(){setTimeout(initMap,100);};document.head.appendChild(s);
  var c=document.createElement('link');c.rel='stylesheet';c.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(c);
}
</script>
</body>
