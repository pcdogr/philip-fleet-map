  }
  f.innerHTML='<button data-d="all" style="background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;color:#fff;font-size:12px;cursor:pointer;font-weight:600;opacity:1;border-bottom:2px solid #fff">🌐 全部 '+markers.length+'</button>'+
    '<button data-d="china" style="background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;color:#ff4757;font-size:12px;cursor:pointer;font-weight:600;opacity:0.4">🇨🇳 '+cnCount+'</button>'+
    '<button data-d="singapore" style="background:rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:6px 10px;color:#2ed573;font-size:12px;cursor:pointer;font-weight:600;opacity:0.4">🇸🇬 '+sgCount+'</button>';
  f.onclick=function(e){var b=e.target.closest('button');if(b)setFilter(b.dataset.d);};
  document.body.appendChild(f);
  
  var b=document.createElement('div');
  b.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 20px;display:flex;gap:16px;font-size:12px';
  b.innerHTML='<div><span style="font-weight:700;font-size:14px;color:#fff">'+markers.length+'</span> 实时</div>'+
    '<div><span style="font-weight:700;font-size:14px;color:#ff4757">'+cnCount+'</span> 🇨🇳</div>'+
    '<div><span style="font-weight:700;font-size:14px;color:#2ed573">'+sgCount+'</span> 🇸🇬</div>';
  document.body.appendChild(b);
  
  setTimeout(function(){map.invalidateSize();},300);
}

// Backup CDN if cdnjs fails
if(typeof L==='undefined'){
  var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
  s.onload=function(){setTimeout(initMap,100);};document.head.appendChild(s);
  var c=document.createElement('link');c.rel='stylesheet';c.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(c);
}
</script>
