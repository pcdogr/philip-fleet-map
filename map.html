<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚢 Philip Fleet — 船队地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0e17;color:#e0e0e0;overflow:hidden}
#map{height:100vh;width:100%}
.owner-panel{position:absolute;top:20px;left:20px;z-index:1000;background:rgba(10,14,23,0.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;width:200px;max-height:calc(100vh-160px);overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.owner-panel::-webkit-scrollbar{width:4px}
.owner-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
.owner-panel h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#fff;letter-spacing:1px}
.owner-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s;margin-bottom:2px}
.owner-item:hover{background:rgba(255,255,255,0.06)}
.owner-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.owner-item .oname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.owner-item .ocount{color:rgba(255,255,255,0.4);font-size:11px}
.owner-item.active{background:rgba(255,255,255,0.12)}
.right-panel{position:absolute;top:20px;right:20px;z-index:1000;background:rgba(10,14,23,0.92);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;min-width:140px;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.right-panel h3{font-size:13px;font-weight:600;margin-bottom:8px;color:#fff;letter-spacing:1px}
.dir-item{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .2s}
.dir-item:hover{background:rgba(255,255,255,0.06)}
.dir-item .dcount{margin-left:auto;color:rgba(255,255,255,0.4);font-size:11px}
.dir-item.active{background:rgba(255,255,255,0.1)}
.stats-bar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(10,14,23,0.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 20px;z-index:1000;display:flex;gap:20px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.stats-bar .num{font-weight:700;font-size:14px}
.num-cn{color:#ff4757}
.num-sg{color:#2ed573}
.custom-popup .leaflet-popup-content-wrapper{background:rgba(10,14,23,0.95);backdrop-filter:blur(8px);color:#e0e0e0;border:1px solid rgba(255,255,255,0.1);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.custom-popup .leaflet-popup-tip{background:rgba(10,14,23,0.95)}
.popup-content{padding:4px;min-width:280px}
.popup-content h2{font-size:15px;font-weight:700;margin-bottom:6px;color:#fff}
.popup-content .row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px}
.popup-content .row:last-child{border-bottom:none}
.popup-content .label{color:rgba(255,255,255,0.45)}
.popup-content .value{color:#e0e0e0;font-weight:500;text-align:right}
.popup-content .badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge-cn{background:rgba(255,71,87,0.25);color:#ff4757}
.badge-sg{background:rgba(46,213,115,0.25);color:#2ed573}
.badge-other{background:rgba(95,108,128,0.25);color:#8c9cad}
.ship-marker{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.ship-marker:hover{transform:scale(1.3);z-index:1000!important}
.marker-cn{background:rgba(255,71,87,0.3);border-color:#ff4757;color:#ff4757}
.marker-sg{background:rgba(46,213,115,0.3);border-color:#2ed573;color:#2ed573}
.marker-other{background:rgba(95,108,128,0.3);border-color:#5f6c80;color:#8c9cad}
.leaflet-marker-icon{background:none!important;border:none!important}
</style>

const CFG = {"owners": ["Angelakos", "Bulkseas", "Charterwell", "Dalnave Navigation", "Evalend", "Goldenport", "Ilios", "Laskaridis", "Navitramp&Novelty", "OceanStar", "Paloma&Mantinia", "Prime Tanker", "Trade Fortune", "ionic"], "ownerColors": {"Angelakos": "#FF6B6B", "Bulkseas": "#4ECDC4", "Charterwell": "#45B7D1", "Dalnave Navigation": "#96CEB4", "Evalend": "#FFEAA7", "Goldenport": "#DDA0DD", "Ilios": "#98D8C8", "Laskaridis": "#F7DC6F", "Navitramp&Novelty": "#BB8FCE", "OceanStar": "#85C1E9", "Paloma&Mantinia": "#F0B27A", "Prime Tanker": "#82E0AA", "Trade Fortune": "#F1948A", "ionic": "#85929E"}, "ownerCn": {"Angelakos": "Angelakos", "Bulkseas": "Bulkseas", "Charterwell": "Charterwell", "Dalnave Navigation": "Dalnave", "Evalend": "Evalend", "Goldenport": "Goldenport", "Ilios": "Ilios", "Laskaridis": "Laskaridis", "Navitramp&Novelty": "Navitramp", "OceanStar": "OceanStar", "Paloma&Mantinia": "Paloma", "Prime Tanker": "Prime", "Trade Fortune": "Trade", "ionic": "ionic"}, "now": "2026-06-05 05:43 UTC"};

const OWNER_ORDER = CFG.owners;
const OWNER_COLORS = CFG.ownerColors;
const OWNER_DISPLAY = CFG.ownerCn;

const map = L.map('map', {center:[15,120],zoom:3,minZoom:2,maxBounds:[[-80,-180],[80,180]]});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {attribution:'&copy; OSM &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

let activeOwner = null;
let activeDir = 'all';
let allMarkers = [];

function hdg(h){const n=parseFloat(h);return isNaN(n)?0:n}
function spdTxt(s){const n=parseFloat(s);return isNaN(n)||n===0?'':' '+n.toFixed(1)+' kn'}

function makePopup(s){
  const dirStr=s.dr==='china'?'🇨🇳 中国':s.dr==='singapore'?'🇸🇬 新加坡':'🌍 其他';
  const bdg=s.dr==='china'?'badge-cn':s.dr==='singapore'?'badge-sg':'badge-other';
  const h=hdg(s.h),sp=spdTxt(s.s),la=s.la.toFixed(4),lo=s.lo.toFixed(4);
  return '<div class="popup-content"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><h2>🚢 '+s.n+'</h2><span class="badge '+bdg+'">'+dirStr+'</span></div>'
    +'<div class="row"><span class="label">IMO</span><span class="value">'+s.i+'</span></div>'
    +'<div class="row"><span class="label">船东</span><span class="value">'+s.oc+'</span></div>'
    +'<div class="row"><span class="label">位置</span><span class="value">'+la+', '+lo+'</span></div>'
    +'<div class="row"><span class="label">航速/航向</span><span class="value">'+(sp||'N/A')+(h?' | '+h+'°':'')+'</span></div>'
    +'<div class="row"><span class="label">目的港</span><span class="value">'+(s.d||'N/A').split(',')[0].substring(0,30)+'</span></div>'
    +'<div class="row"><span class="label">类型</span><span class="value">'+(s.t||'N/A')+'</span></div>'
    +'<div class="row"><span class="label">总吨</span><span class="value">'+(s.g||'N/A')+'</span></div>'
    +'<div class="row"><span class="label">船旗/年份</span><span class="value">'+(s.f||'N/A')+' · '+(s.y||'N/A')+'</span></div>'
    +'<div class="row"><span class="label">ETA</span><span class="value">'+(s.e||'N/A')+'</span></div></div>';
}

for(const s of SHIPS){
  if(!s.la||!s.lo)continue;
  const cls=s.dr==='china'?'marker-cn':s.dr==='singapore'?'marker-sg':'marker-other';
  const lbl=s.dr==='china'?'🇨🇳':s.dr==='singapore'?'🇸🇬':'🌍';
  const icon=L.divIcon({className:'',html:'<div class="ship-marker '+cls+'" style="border-color:'+(OWNER_COLORS[s.o]||'#5f6c80')+'">'+lbl+'</div>',iconSize:[36,36],iconAnchor:[18,18],popupAnchor:[0,-20]});
  const m=L.marker([s.la,s.lo],{icon}).bindPopup(makePopup(s),{className:'custom-popup',maxWidth:340});
  m._ship=s;
  allMarkers.push(m);
}

function renderOwners(){
  const list=document.getElementById('ownerList');
  list.innerHTML='';
  for(const o of OWNER_ORDER){
    const cnt=SHIPS.filter(s=>s.o===o&&s.la).length;
    const total=SHIPS.filter(s=>s.o===o).length;
    const div=document.createElement('div');
    div.className='owner-item'+(activeOwner===o?' active':'');
    div.innerHTML='<span class="dot" style="background:'+OWNER_COLORS[o]+'"></span><span class="oname">'+(OWNER_DISPLAY[o]||o)+'</span><span class="ocount">'+cnt+'/'+total+'</span>';
    div.onclick=function(){toggleOwner(o)};
    list.appendChild(div);
  }
}

function applyFilter(){
  filteredMarkers=allMarkers.filter(function(m){
    const s=m._ship;
    if(activeOwner&&s.o!==activeOwner)return false;
    if(activeDir!=='all'&&s.dr!==activeDir)return false;
    return true;
  });
  for(const m of allMarkers)map.removeLayer(m);
  for(const m of filteredMarkers)map.addLayer(m);
  const cn=filteredMarkers.filter(function(m){return m._ship.dr==='china'}).length;
  const sg=filteredMarkers.filter(function(m){return m._ship.dr==='singapore'}).length;
  const other=filteredMarkers.filter(function(m){return m._ship.dr==='other'}).length;
  document.getElementById('count-all').textContent=filteredMarkers.length;
  document.getElementById('count-cn').textContent=cn;
  document.getElementById('count-sg').textContent=sg;
  document.getElementById('count-other').textContent=other;
  document.getElementById('total-count').textContent=filteredMarkers.length;
  document.getElementById('stat-cn').textContent=cn;
  document.getElementById('stat-sg').textContent=sg;
  if(filteredMarkers.length>0){
    try{
      const bounds=L.latLngBounds(filteredMarkers.map(function(m){return m.getLatLng()}));
      map.fitBounds(bounds,{padding:[40,40],maxZoom:6});
    }catch(e){}
  }
}

function toggleOwner(o){
  activeOwner=activeOwner===o?null:o;
  renderOwners();
  applyFilter();
}

document.getElementById('dir-all').onclick=function(){activeDir='all';applyFilter()};
document.getElementById('dir-china').onclick=function(){activeDir='china';applyFilter()};
document.getElementById('dir-singapore').onclick=function(){activeDir='singapore';applyFilter()};
document.getElementById('dir-other').onclick=function(){activeDir='other';applyFilter()};

renderOwners();
applyFilter();
