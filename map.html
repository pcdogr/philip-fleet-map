<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

#map { height: 100vh; width: 100%; }
.legend {

.legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: background 0.2s; }
.legend-item:hover { background: rgba(255,255,255,0.06); }
.legend-item .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }
.dot-cn { background: #ff4757; box-shadow: 0 0 8px rgba(255,71,87,0.4); }
.dot-sg { background: #2ed573; box-shadow: 0 0 8px rgba(46,213,115,0.4); }
.dot-other { background: #5f6c80; }
.legend-item .count { margin-left: auto; color: rgba(255,255,255,0.5); font-size: 12px; }
.stats-bar {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);

  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 10px 24px;
  z-index: 1000;
  display: flex;
  gap: 24px;
  font-size: 13px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.stats-bar .stat { display: flex; align-items: center; gap: 6px; }
.stats-bar .num { font-weight: 700; font-size: 15px; }
.num-cn { color: #ff4757; }
.num-sg { color: #2ed573; }
.custom-popup .leaflet-popup-content-wrapper {
  background: rgba(10, 14, 23, 0.95);
  backdrop-filter: blur(8px);
  color: #e0e0e0;
  border: 1px solid rgba(255,255,255,0.1);

  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.custom-popup .leaflet-popup-tip { background: rgba(10, 14, 23, 0.95); }
.popup-content { padding: 4px; min-width: 280px; }
.popup-content h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #fff; }
.popup-content .row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
.popup-content .row:last-child { border-bottom: none; }
.popup-content .label { color: rgba(255,255,255,0.5); }
.popup-content .value { color: #e0e0e0; font-weight: 500; text-align: right; }
.popup-content .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-cn { background: rgba(255,71,87,0.25); color: #ff4757; }
.badge-sg { background: rgba(46,213,115,0.25); color: #2ed573; }
.badge-other { background: rgba(95,108,128,0.25); color: #8c9cad; }
.ship-marker {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  border: 2px solid;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;

.ship-marker:hover { transform: scale(1.3); z-index: 1000 !important; }
.marker-cn { background: rgba(255,71,87,0.3); border-color: #ff4757; color: #ff4757; }
.marker-sg { background: rgba(46,213,115,0.3); border-color: #2ed573; color: #2ed573; }
.marker-other { background: rgba(95,108,128,0.3); border-color: #5f6c80; color: #8c9cad; }
.leaflet-marker-icon { background: none !important; border: none !important; }
</style>

// 计算航向箭头旋转
function headingDeg(h) {
  const n = parseFloat(h);
  return isNaN(n) ? 0 : n;
}

function speedTxt(s) {
  const n = parseFloat(s);
  return isNaN(n) ? '' : ` ${n.toFixed(1)} kn`;
}

const map = L.map('map', {
  center: [15, 120],
  zoom: 3,
  minZoom: 2,
  maxBounds: [[-80, -180], [80, 180]]
});

  attribution: '&copy; OSM &copy; CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

const markers = [];
const markerLayers = { china: [], singapore: [], other: [] };

for (const s of SHIPS) {
  if (!s.lat || !s.lng) continue;
  const lat = s.lat, lng = s.lng;
  const dir = s.direction;
  const cls = dir === 'china' ? 'marker-cn' : dir === 'singapore' ? 'marker-sg' : 'marker-other';
  const bdg = dir === 'china' ? 'badge-cn' : dir === 'singapore' ? 'badge-sg' : 'badge-other';
  const label = dir === 'china' ? '🇨🇳' : dir === 'singapore' ? '🇸🇬' : '🌍';
  const hdg = headingDeg(s.heading);
  const spd = speedTxt(s.speed);

  const dirStr = dir === 'china' ? '🇨🇳 中国' : dir === 'singapore' ? '🇸🇬 新加坡' : '🌍 其他';

  let popupHtml = `
    <div class="popup-content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <h2>🚢 ${s.name}</h2>
        <span class="badge ${bdg}">${dirStr}</span>
      </div>
      <div class="row"><span class="label">IMO</span><span class="value">${s.imo}</span></div>
      <div class="row"><span class="label">当前位置</span><span class="value">${lat.toFixed(4)}, ${lng.toFixed(4)}</span></div>
      <div class="row"><span class="label">航速/航向</span><span class="value">${spd || 'N/A'} ${hdg ? '| ' + hdg + '°' : ''}</span></div>
      <div class="row"><span class="label">目的港</span><span class="value">${s.destination ? s.destination.split(',')[0].substring(0, 30) : 'N/A'}</span></div>
      <div class="row"><span class="label">船东</span><span class="value">${s.owner}</span></div>
      <div class="row"><span class="label">类型</span><span class="value">${s.type || 'N/A'}</span></div>
      <div class="row"><span class="label">总吨</span><span class="value">${s.gross_tonnage || 'N/A'}</span></div>
      <div class="row"><span class="label">船旗/年份</span><span class="value">${s.flag || 'N/A'} · ${s.year || 'N/A'}</span></div>
      <div class="row"><span class="label">ETA</span><span class="value">${s.eta || 'N/A'}</span></div>
    </div>`;

  const icon = L.divIcon({
    className: '',
    html: `<div class="ship-marker ${cls}">${label}</div>`,
    iconSize: [40, 40],
    iconAnchor: [20, 20],
    popupAnchor: [0, -24]
  });

  const m = L.marker([lat, lng], { icon }).addTo(map).bindPopup(popupHtml, { className: 'custom-popup', maxWidth: 360 });
  markers.push(m);
  markerLayers[dir].push(m);
}

document.getElementById('count-cn').textContent = markerLayers.china.length;
document.getElementById('count-sg').textContent = markerLayers.singapore.length;
document.getElementById('count-other').textContent = markerLayers.other.length;
document.getElementById('total-count').textContent = markers.length;
document.getElementById('stat-cn').textContent = markerLayers.china.length;
document.getElementById('stat-sg').textContent = markerLayers.singapore.length;

let currentFilter = 'all';
function filterDirection(dir) {
  for (const m of markers) map.removeLayer(m);
  if (dir === 'all') { for (const m of markers) map.addLayer(m); return; }
  for (const m of markerLayers[dir]) map.addLayer(m);
}
document.getElementById('filter-cn').onclick = () => {
  if (currentFilter === 'china') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'china'; filterDirection('china'); }
};
document.getElementById('filter-sg').onclick = () => {
  if (currentFilter === 'singapore') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'singapore'; filterDirection('singapore'); }
};
document.getElementById('filter-other').onclick = () => {
  if (currentFilter === 'other') { currentFilter = 'all'; filterDirection('all'); }
  else { currentFilter = 'other'; filterDirection('other'); }
};
document.getElementById('filter-all').onclick = () => { currentFilter = 'all'; filterDirection('all'); };
filterDirection('all');
