function checkPw(){
  var p=document.getElementById("pw").value;
  if(p==="pcdogr2026"){
    document.getElementById("loginOverlay").classList.add("hidden");
    initMap();
    try{localStorage.setItem("fleet_auth","1");}catch(e){}
  }else{
    document.getElementById("pwErr").style.display="block";
    document.getElementById("pw").value="";
  }
}

  document.getElementById("loginOverlay").classList.add("hidden");
  setTimeout(initMap, 100);
}}catch(e){}

function initMap(){
  if(typeof L === 'undefined'){ setTimeout(initMap, 200); return; }
  
  var map = L.map('map', {center:[15,120], zoom:3, minZoom:2, maxBounds:[[-80,-180],[80,180]]});
  
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  
  var cnKw = ['CN','CHINA','QINGDAO','DALIAN','ZHOUSHAN','CHIWAN','HUANGPU','DDG','ZHUHAI','HUIZHOU','SHANGHAI'];
  var sgKw = ['SINGAPORE','SGSING'];
  var colors = {"Angelakos": "#FF6B6B", "Bulkseas": "#4ECDC4", "Charterwell": "#45B7D1", "Dalnave Navigation": "#96CEB4", "Evalend": "#FFEAA7", "Goldenport": "#DDA0DD", "Ilios": "#98D8C8", "Laskaridis": "#F7DC6F", "Navitramp&Novelty": "#BB8FCE", "OceanStar": "#85C1E9", "Paloma&Mantinia": "#E8A87C", "Prime Tanker": "#95E1D3", "Trade Fortune": "#F38181", "ionic": "#AA96DA"};
  
  function dirOf(d){
    if(!d)return'other';var u=d.toUpperCase().replace(/\s/g,'');
    for(var k=0;k<cnKw.length;k++){if(u.indexOf(cnKw[k])>=0)return'china'}
    for(var k=0;k<sgKw.length;k++){if(u.indexOf(sgKw[k])>=0)return'singapore'}
    return'other';
  }
  
  var markers = [];
  for(var i=0;i<SHIPS.length;i++){
    var s = SHIPS[i];
    if(!s.la||!s.lo) continue;
    s.dr = dirOf(s.d);
    var cls = s.dr==='china'? 'marker-cn' : s.dr==='singapore'? 'marker-sg' : 'marker-other';
    var lbl = s.dr==='china'? '🇨🇳' : s.dr==='singapore'? '🇸🇬' : '🌍';
    var clr = colors[s.o]||'#5f6c80';
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid '+clr+';background:rgba(10,14,23,0.85);box-shadow:0 2px 8px rgba(0,0,0,0.3);color:#fff">'+lbl+'</div>',
      iconSize: [32,32],
      iconAnchor: [16,16],
      popupAnchor: [0,-18]
    });
    var popup = '<div style="padding:4px;min-width:240px">'+
      '<h2 style="font-size:14px;font-weight:700;margin-bottom:4px;color:#fff">🚢 '+s.n+'</h2>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px"><span style="color:rgba(255,255,255,0.45)">IMO</span><span style="color:#e0e0e0;font-weight:500">'+s.i+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px"><span style="color:rgba(255,255,255,0.45)">船东</span><span style="color:#e0e0e0;font-weight:500">'+s.o+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px"><span style="color:rgba(255,255,255,0.45)">类型</span><span style="color:#e0e0e0;font-weight:500">'+(s.t||'N/A')+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px"><span style="color:rgba(255,255,255,0.45)">坐标</span><span style="color:#e0e0e0;font-weight:500">'+s.la.toFixed(2)+', '+s.lo.toFixed(2)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.06);font-size:12px"><span style="color:rgba(255,255,255,0.45)">目的港</span><span style="color:#e0e0e0;font-weight:500">'+(s.d||'N/A').substring(0,30)+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:12px"><span style="color:rgba(255,255,255,0.45)">ETA</span><span style="color:#e0e0e0;font-weight:500">'+(s.e||'N/A')+'</span></div></div>';
    
    var m = L.marker([s.la, s.lo], {icon: icon}).bindPopup(popup, {className:'custom-popup', maxWidth:320});
    markers.push(m);
    m.addTo(map);
  }
  
  // Update counters
  var total = markers.length;
  var cn = markers.filter(function(m){return m._popup&&m._popup._source&&m._popup._source.dr==='china'}).length || SHIPS.filter(function(s){return dirOf(s.d)==='china'&&s.la}).length;
  var sg = SHIPS.filter(function(s){return dirOf(s.d)==='singapore'&&s.la}).length;
  
  // Create simple stats bar
  var bar = document.createElement('div');
  bar.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(10,14,23,0.88);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:8px 20px;display:flex;gap:16px;font-size:12px';
  bar.innerHTML = ''+
    '<div><span class="num" style="font-weight:700;font-size:14px;color:#fff">'+total+'</span> 实时</div>'+
    '<div><span class="num" style="font-weight:700;font-size:14px;color:#ff4757">'+cn+'</span> 🇨🇳</div>'+
    '<div><span class="num" style="font-weight:700;font-size:14px;color:#2ed573">'+sg+'</span> 🇸🇬</div>';
  document.body.appendChild(bar);
  
  // Auto-refresh
  setTimeout(function(){map.invalidateSize();}, 500);
}
